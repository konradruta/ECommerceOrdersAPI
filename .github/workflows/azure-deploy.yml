name: Build and deploy .NET app to Azure

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --no-build

    - name: Publish project
      run: dotnet publish -c Release -o publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: app

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A6EAA5A3D59E4384BD2F52FF5FB57E58 }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9EFDBD053C504F66847D4BB557F170C5 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FA80836425834E9380D8A8C113C14257 }}

    - name: Deploy infrastructure with Bicep
      uses: azure/cli@v2
      with:
        inlineScript: |
          az deployment group create \
            --resource-group rg-ecommerceorders-API \
            --template-file infra/main.bicep

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ecommerceorders-app
        package: .
